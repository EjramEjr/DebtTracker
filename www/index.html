<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Debt Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* أكواد النينجا لإخفاء إضافة Grammarly وأي زر غريب يظهر فجأة */
        grammarly-desktop-integration, grammarly-extension, .grammarly-desktop-integration { display: none !important; visibility: hidden !important; opacity: 0 !important; }
        
        :root { --primary: #6366f1; --secondary: #ec4899; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --dark: #0f172a; --dark-light: #1e293b; --light: #f8fafc; --gray: #94a3b8; --radius: 16px; --radius-sm: 12px; --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        input { user-select: auto; }
        body { background: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81); min-height: 100vh; color: var(--light); overflow-x: hidden; padding-top: env(safe-area-inset-top); }
        
        #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f172a, #1e1b4b); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #authView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .auth-card { background: rgba(255,255,255,0.03); padding: 35px 25px; border-radius: var(--radius); width: 100%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(15px); box-shadow: 0 15px 35px rgba(0,0,0,0.3); margin: auto; }
        .auth-card h2 { margin-bottom: 10px; color: var(--primary); font-size: 1.8rem; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .auth-input { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; outline: none; transition: var(--transition); font-size: 0.95rem; }
        .auth-input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }
        .btn { padding: 14px; border: none; border-radius: var(--radius-sm); font-weight: bold; cursor: pointer; transition: var(--transition); font-size: 0.95rem; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: linear-gradient(to right, var(--primary), #4f46e5); color: white; }
        .btn-outline { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-social { background: rgba(255,255,255,0.05); color: white; margin-bottom: 10px; }
        .btn-social.google { background: #db4437; border-color: transparent; }
        .btn-social.phone { background: var(--success); border-color: transparent; }
        
        #sidebarOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1001; opacity: 0; pointer-events: none; transition: 0.3s; }
        #sidebarOverlay.active { opacity: 1; pointer-events: auto; }
        #sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--dark-light); z-index: 1002; transition: 0.3s; display: flex; flex-direction: column; }
        #sidebar.active { right: 0; }
        html[dir="ltr"] #sidebar { right: auto; left: -280px; } html[dir="ltr"] #sidebar.active { left: 0; }
        .sidebar-header { padding: 30px 20px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-align: center; }
        .sidebar-avatar { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .sidebar-email { font-size: 0.9rem; opacity: 0.9; word-break: break-all; }
        .sidebar-links { padding: 20px 0; flex: 1; overflow-y: auto; }
        .sidebar-link { display: flex; align-items: center; gap: 15px; padding: 15px 20px; color: var(--light); text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .fb-color { color: #1877F2; } .wa-color { color: #25D366; }

        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 8px; }
        .search-container { padding: 15px 20px 0; }
        .search-input { width: 100%; padding: 12px 15px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none; }
        .sync-badge { display: none; background: var(--warning); color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin: 0 auto; }
        
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .stat-card { background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); padding: 20px; border-radius: var(--radius); text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-value { font-size: 1.8rem; font-weight: 800; margin: 10px 0; }
        
        .customers-container { padding: 0 20px 80px; display: grid; gap: 12px; }
        .customer-card { background: rgba(255, 255, 255, 0.03); padding: 18px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .customer-info h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .customer-debt { font-size: 1.3rem; font-weight: bold; color: var(--secondary); }
        
        #detailView { display: none; padding: 20px; padding-bottom: 90px; }
        .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .total-box { text-align: center; padding: 25px; background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); border-radius: var(--radius); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .total-amount { font-size: 2.8rem; color: var(--primary); font-weight: 800; }
        
        .debt-item { background: rgba(255,255,255,0.03); padding: 18px 15px; border-radius: var(--radius-sm); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .debt-item::before { content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 100%; background: var(--danger); }
        html[dir="ltr"] .debt-item::before { right: auto; left: 0; }
        .debt-item.payment::before { background: var(--success); }
        .debt-item-details { display: flex; flex-direction: column; gap: 5px; }
        .debt-item-title { font-weight: 700; font-size: 1.1rem; color: #fff; }
        .debt-item-date { font-size: 0.8rem; color: var(--gray); }
        .debt-item-actions { display: flex; align-items: center; gap: 15px; }
        .debt-amount { font-weight: 800; font-size: 1.3rem; }
        .debt-item.payment .debt-amount { color: var(--success); }
        .debt-item.debt .debt-amount { color: var(--danger); }
        .action-icons i { color: rgba(255,255,255,0.4); padding: 10px; font-size: 1.1rem; cursor: pointer; background: rgba(255,255,255,0.05); border-radius: 8px; }
        
        .fab { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-size: 1.5rem; border: none; cursor: pointer; box-shadow: 0 8px 25px rgba(236,72,153,0.4); display: flex; align-items: center; justify-content: center; z-index: 90; }
        html[dir="ltr"] .fab { left: auto; right: 30px; } .fab.hidden { transform: scale(0); opacity: 0; pointer-events: none; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: var(--transition); }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--dark-light); padding: 25px; border-radius: var(--radius); width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); transform: translateY(20px); transition: var(--transition); text-align: center; }
        .modal.active .modal-content { transform: translateY(0); }
    </style>
</head>
<body>
    <div id="splashScreen"><h1 class="logo" style="font-size: 2.5rem;"><i class="fas fa-wallet"></i> دفتر الديون</h1><div class="spinner"></div></div>

    <div id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <div class="sidebar-header"><div class="sidebar-avatar"><i class="fas fa-user"></i></div><div class="sidebar-email" id="sidebarUserEmail">جاري التحميل...</div></div>
        <div class="sidebar-links">
            <a href="https://www.facebook.com/EjramGamer07?mibextid=ZbWKwL" class="sidebar-link"><i class="fab fa-facebook fb-color"></i> <span data-ar="فيسبوك" data-en="Facebook">فيسبوك</span></a>
            <a href="https://wa.me/201274186544" class="sidebar-link"><i class="fab fa-whatsapp wa-color"></i> <span data-ar="واتساب" data-en="WhatsApp">واتساب</span></a>
            <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 15px 20px;"></div>
            <a href="#" class="sidebar-link" onclick="logout()" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> <span data-ar="تسجيل الخروج" data-en="Logout">تسجيل الخروج</span></a>
        </div>
    </div>

    <div id="authView" style="display: none;">
        <div class="auth-card">
            <h2 class="logo" style="justify-content:center; margin-bottom: 5px;"><i class="fas fa-wallet"></i> <span data-ar="دفتر الديون" data-en="Debt Tracker">دفتر الديون</span></h2>
            <p style="margin-bottom: 25px; color: var(--gray); font-size: 0.9rem;" data-ar="مزامنة سحابية آمنة لبياناتك" data-en="Secure cloud sync">مزامنة سحابية آمنة لبياناتك</p>
            
            <div id="loginForm">
                <form onsubmit="event.preventDefault(); emailLogin();">
                    <div class="input-group"><input type="email" id="loginEmail" class="auth-input" data-placeholder-ar="البريد الإلكتروني" data-placeholder-en="Email" autocomplete="off" spellcheck="false" data-gramm="false"></div>
                    <div class="input-group"><input type="password" id="loginPass" class="auth-input" data-placeholder-ar="كلمة المرور" data-placeholder-en="Password" style="-webkit-text-security: disc;" autocomplete="off" data-gramm="false"></div>
                    <button type="submit" class="btn btn-main" style="margin-bottom: 10px;" data-ar="تسجيل الدخول" data-en="Login">تسجيل الدخول</button>
                    <button type="button" class="btn btn-outline" onclick="toggleAuthForm()" data-ar="إنشاء حساب جديد" data-en="Create Account">إنشاء حساب جديد</button>
                </form>
                <div style="display: flex; align-items: center; margin: 20px 0; color: var(--gray); font-size: 0.85rem;"><div style="flex: 1; height: 1px; background: rgba(255,255,255,0.1);"></div><span style="padding: 0 10px;" data-ar="أو" data-en="OR">أو</span><div style="flex: 1; height: 1px; background: rgba(255,255,255,0.1);"></div></div>
                <button class="btn btn-social google" onclick="googleLogin()"><i class="fab fa-google"></i> <span data-ar="حساب جوجل" data-en="Google">حساب جوجل</span></button>
                <button class="btn btn-social phone" onclick="openPhoneAuth()"><i class="fas fa-phone"></i> <span data-ar="رقم الهاتف" data-en="Phone">رقم الهاتف</span></button>
            </div>

            <div id="registerForm" style="display: none;">
                <form onsubmit="event.preventDefault(); emailRegister();">
                    <div class="input-group"><input type="email" id="regEmail" class="auth-input" data-placeholder-ar="البريد الإلكتروني الجديد" data-placeholder-en="New Email" autocomplete="off" data-gramm="false"></div>
                    <div class="input-group"><input type="password" id="regPass" class="auth-input" data-placeholder-ar="كلمة مرور قوية" data-placeholder-en="Strong Password" style="-webkit-text-security: disc;" autocomplete="off" data-gramm="false"></div>
                    <button type="submit" class="btn btn-main" style="margin-bottom: 10px; background: var(--success);" data-ar="تأكيد الإنشاء" data-en="Register">تأكيد الإنشاء</button>
                    <button type="button" class="btn btn-outline" onclick="toggleAuthForm()" data-ar="العودة للدخول" data-en="Back">العودة للدخول</button>
                </form>
            </div>
        </div>
    </div>

    <div id="appView" style="display: none;">
        <header class="header">
            <button style="background:none; border:none; color:white; font-size:1.4rem; cursor:pointer;" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="sync-badge" id="syncBadge"><i class="fas fa-sync fa-spin"></i></div>
        </header>

        <div id="dashboardView">
            <div class="search-container"><input type="search" id="searchInput" class="search-input" data-placeholder-ar="ابحث عن اسم العميل..." data-placeholder-en="Search customer..." oninput="filterCustomers()"></div>
            <div class="stats-container">
                <div class="stat-card"><i class="fas fa-users" style="color:var(--primary); font-size: 2.2rem; margin-bottom:5px;"></i><div class="stat-value" id="totalCustomers">0</div><div style="color:var(--gray);" data-ar="العملاء" data-en="Customers">العملاء</div></div>
                <div class="stat-card"><i class="fas fa-money-bill-wave" style="color:var(--secondary); font-size: 2.2rem; margin-bottom:5px;"></i><div class="stat-value" id="totalDebt">0</div><div style="color:var(--gray);" data-ar="إجمالي الديون" data-en="Total Debt">إجمالي الديون</div></div>
            </div>
            <div class="customers-container" id="customersList"></div>
        </div>

        <div id="detailView">
            <div class="detail-header">
                <h2 id="customerNameTitle">Customer</h2>
                <div style="display:flex; gap:10px;">
                    <button style="background:rgba(239, 68, 68, 0.2); border:none; padding:8px 12px; border-radius:8px; color:var(--danger); cursor:pointer;" onclick="deleteCustomerConfirm()"><i class="fas fa-trash"></i></button>
                    <button style="background:rgba(255,255,255,0.1); border:none; padding:8px 15px; border-radius:8px; color:white; cursor:pointer;" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
                </div>
            </div>
            <div class="total-box"><div style="color:var(--gray); font-size:1.1rem; margin-bottom:5px;" data-ar="المبلغ المستحق" data-en="Amount Due">المبلغ المستحق</div><div class="total-amount" id="customerTotalDebt">0</div></div>
            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <button class="btn" style="background:var(--danger);" onclick="openModal('debtModal')"><i class="fas fa-plus"></i> <span data-ar="دين جديد" data-en="Add Debt">دين جديد</span></button>
                <button class="btn" style="background:var(--success);" onclick="openModal('paymentModal')"><i class="fas fa-hand-holding-usd"></i> <span data-ar="تسديد" data-en="Payment">تسديد</span></button>
            </div>
            <h3 style="margin: 0 0 15px; padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.1);" data-ar="سجل العمليات" data-en="History">سجل العمليات</h3>
            <div id="debtsList"></div>
        </div>
    </div>

    <button class="fab" id="mainFab" onclick="openModal('customerModal')"><i class="fas fa-plus"></i></button>

    <div class="modal" id="customAlertModal"><div class="modal-content"><div id="customAlertIcon" style="font-size:3rem; color:var(--primary); margin-bottom:15px;"><i class="fas fa-info-circle"></i></div><h3 id="customAlertTitle" style="margin-bottom:10px;">تنبيه</h3><p id="customAlertMsg" style="color:var(--gray); margin-bottom:20px; font-size:0.95rem;"></p><button class="btn btn-main" onclick="hideModal('customAlertModal')" data-ar="حسناً" data-en="OK">حسناً</button></div></div>
    <div class="modal" id="customConfirmModal"><div class="modal-content"><div style="font-size:3rem; color:var(--danger); margin-bottom:15px;"><i class="fas fa-exclamation-triangle"></i></div><h3 data-ar="تأكيد الحذف" data-en="Confirm Delete">تأكيد الحذف</h3><p id="customConfirmMsg" style="color:var(--gray); margin-bottom:20px; font-size:0.95rem;"></p><div style="display:flex; gap:10px;"><button class="btn" style="background:var(--danger); color:white;" onclick="executeConfirm()" data-ar="نعم، احذف" data-en="Yes, Delete">نعم، احذف</button><button class="btn btn-outline" onclick="hideModal('customConfirmModal')" data-ar="إلغاء" data-en="Cancel">إلغاء</button></div></div></div>
    <div class="modal" id="phoneAuthModal"><div class="modal-content"><h3 style="margin-bottom: 20px;" data-ar="الدخول برقم الهاتف" data-en="Phone Login">الدخول برقم الهاتف</h3><div id="phoneStep1"><input type="tel" id="phoneNumber" class="auth-input" placeholder="+201012345678" dir="ltr" style="text-align:center;" autocomplete="off" data-gramm="false"><div id="recaptcha-container" style="margin-bottom: 15px; display:flex; justify-content:center;"></div><div style="display:flex; gap:10px;"><button class="btn btn-main" onclick="sendSmsCode()" data-ar="إرسال" data-en="Send">إرسال</button><button class="btn btn-outline" onclick="hideModal('phoneAuthModal')" data-ar="إلغاء" data-en="Cancel">إلغاء</button></div></div><div id="phoneStep2" style="display: none;"><input type="number" id="smsCode" class="auth-input" placeholder="123456" dir="ltr" style="text-align:center;" autocomplete="off" data-gramm="false"><div style="display:flex; gap:10px;"><button class="btn btn-main" style="background:var(--success);" onclick="verifySmsCode()" data-ar="تأكيد" data-en="Verify">تأكيد</button><button class="btn btn-outline" onclick="hideModal('phoneAuthModal')" data-ar="إلغاء" data-en="Cancel">إلغاء</button></div></div></div></div>
    <div class="modal" id="customerModal"><div class="modal-content"><h3 style="margin-bottom: 20px;" data-ar="عميل جديد" data-en="New Customer">عميل جديد</h3><input type="text" id="custName" class="auth-input" data-placeholder-ar="اسم العميل" data-placeholder-en="Name" autocomplete="off" data-gramm="false"><input type="text" id="custItem" class="auth-input" data-placeholder-ar="البيان (اختياري)" data-placeholder-en="Details (Optional)" autocomplete="off" data-gramm="false"><input type="number" id="custAmount" class="auth-input" data-placeholder-ar="المبلغ" data-placeholder-en="Amount" autocomplete="off" data-gramm="false"><div style="display:flex; gap:10px; margin-top:10px;"><button class="btn btn-main" onclick="addCustomer()" data-ar="حفظ" data-en="Save">حفظ</button><button class="btn btn-outline" onclick="hideModal('customerModal')" data-ar="إلغاء" data-en="Cancel">إلغاء</button></div></div></div>
    <div class="modal" id="debtModal"><div class="modal-content"><h3 style="margin-bottom: 20px;" data-ar="إضافة دين" data-en="Add Debt">إضافة دين</h3><input type="text" id="debtItem" class="auth-input" data-placeholder-ar="البيان / المنتج" data-placeholder-en="Details" autocomplete="off" data-gramm="false"><input type="number" id="debtAmount" class="auth-input" data-placeholder-ar="المبلغ" data-placeholder-en="Amount" autocomplete="off" data-gramm="false"><div style="display:flex; gap:10px; margin-top:10px;"><button class="btn" style="background:var(--danger); color:white;" onclick="addTransaction('debt')" data-ar="حفظ الدين" data-en="Save Debt">حفظ الدين</button><button class="btn btn-outline" onclick="hideModal('debtModal')" data-ar="إلغاء" data-en="Cancel">إلغاء</button></div></div></div>
    <div class="modal" id="paymentModal"><div class="modal-content"><h3 style="margin-bottom: 20px; color:var(--success);" data-ar="تسديد دفعة" data-en="Add Payment">تسديد دفعة</h3><input type="number" id="paymentAmount" class="auth-input" data-placeholder-ar="المبلغ المدفوع" data-placeholder-en="Amount Paid" autocomplete="off" data-gramm="false"><div style="display:flex; gap:10px; margin-top:10px;"><button class="btn" style="background:var(--success); color:white;" onclick="addTransaction('payment')" data-ar="تأكيد الدفع" data-en="Confirm">تأكيد الدفع</button><button class="btn btn-outline" onclick="hideModal('paymentModal')" data-ar="إلغاء" data-en="Cancel">إلغاء</button></div></div></div>
    <div class="modal" id="editModal"><div class="modal-content"><h3 style="margin-bottom: 20px; color:var(--warning);" data-ar="تعديل العملية" data-en="Edit Record">تعديل العملية</h3><input type="text" id="editItem" class="auth-input" data-placeholder-ar="البيان" data-placeholder-en="Details" autocomplete="off" data-gramm="false"><input type="number" id="editAmount" class="auth-input" data-placeholder-ar="المبلغ" data-placeholder-en="Amount" autocomplete="off" data-gramm="false"><div style="display:flex; gap:10px; margin-top:10px;"><button class="btn" style="background:var(--warning); color:white;" onclick="saveEdit()" data-ar="تحديث" data-en="Update">تحديث</button><button class="btn btn-outline" onclick="hideModal('editModal')" data-ar="إلغاء" data-en="Cancel">إلغاء</button></div></div></div>
    <script>
        // كود لتنظيف أي أزرار غريبة من الشاشة بالقوة
        setInterval(() => { document.querySelectorAll('grammarly-desktop-integration, grammarly-extension').forEach(e => e.remove()); }, 1000);

        function showAlert(msg, type='info') { document.getElementById('customAlertMsg').innerText = msg; const icon = document.getElementById('customAlertIcon'); if(type === 'error') { icon.innerHTML = '<i class="fas fa-times-circle"></i>'; icon.style.color = 'var(--danger)'; document.getElementById('customAlertTitle').innerText = isArabic ? 'خطأ' : 'Error'; } else if(type === 'success') { icon.innerHTML = '<i class="fas fa-check-circle"></i>'; icon.style.color = 'var(--success)'; document.getElementById('customAlertTitle').innerText = isArabic ? 'نجاح' : 'Success'; } else { icon.innerHTML = '<i class="fas fa-info-circle"></i>'; icon.style.color = 'var(--primary)'; document.getElementById('customAlertTitle').innerText = isArabic ? 'تنبيه' : 'Notice'; } showModal('customAlertModal'); }
        let currentConfirmAction = null; function showConfirm(msg, action) { document.getElementById('customConfirmMsg').innerText = msg; currentConfirmAction = action; showModal('customConfirmModal'); } function executeConfirm() { hideModal('customConfirmModal'); if(currentConfirmAction) currentConfirmAction(); }
        const isArabic = navigator.language.toLowerCase().startsWith('ar'); document.documentElement.dir = isArabic ? 'rtl' : 'ltr'; document.querySelectorAll('[data-ar]').forEach(el => el.innerHTML = isArabic ? el.getAttribute('data-ar') : el.getAttribute('data-en')); document.querySelectorAll('[data-placeholder-ar]').forEach(el => el.placeholder = isArabic ? el.getAttribute('data-placeholder-ar') : el.getAttribute('data-placeholder-en')); if(!isArabic) document.querySelectorAll('.fa-arrow-left').forEach(i => i.classList.replace('fa-arrow-left', 'fa-arrow-right'));
        function formatNum(num) { return new Intl.NumberFormat('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(num); } function formatDate(isoStr) { return new Intl.DateTimeFormat('en-US', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: true }).format(new Date(isoStr)); }

        const firebaseConfig = { apiKey: "AIzaSyCcKXCMRlVWV7jo53v5EBXYErcq9-d4slQ", authDomain: "aboroqya-4a460.firebaseapp.com", projectId: "aboroqya-4a460", storageBucket: "aboroqya-4a460.firebasestorage.app", appId: "1:998280256788:android:105cfdff77e5dd19d3b601" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore(); const auth = firebase.auth();
        try { db.enablePersistence({ synchronizeTabs: true }); } catch (err) {}

        let currentUser = null; let customers = []; let currentCustomerId = null; let editTransactionId = null; let confirmationResult = null;

        auth.onAuthStateChanged(user => {
            document.getElementById('splashScreen').style.display = 'none';
            if (user) { currentUser = user; document.getElementById('authView').style.display = 'none'; hideModal('phoneAuthModal'); document.getElementById('appView').style.display = 'block'; document.getElementById('sidebarUserEmail').innerText = user.email || user.phoneNumber || 'User'; loadData(); } 
            else { currentUser = null; document.getElementById('authView').style.display = 'flex'; document.getElementById('appView').style.display = 'none'; }
        });

        function toggleAuthForm() { const login = document.getElementById('loginForm'); const reg = document.getElementById('registerForm'); login.style.display = login.style.display === 'none' ? 'block' : 'none'; reg.style.display = login.style.display === 'none' ? 'block' : 'none'; }
        function emailLogin() { const email = document.getElementById('loginEmail').value; const pass = document.getElementById('loginPass').value; if(!email || !pass) return showAlert(isArabic ? "أدخل البيانات أولاً" : "Enter credentials", 'error'); auth.signInWithEmailAndPassword(email, pass).catch(err => showAlert(err.message, 'error')); }
        function emailRegister() { const email = document.getElementById('regEmail').value; const pass = document.getElementById('regPass').value; if(!email || !pass) return showAlert(isArabic ? "أدخل البيانات أولاً" : "Enter credentials", 'error'); auth.createUserWithEmailAndPassword(email, pass).then(() => { showAlert(isArabic ? "تم إنشاء الحساب بنجاح!" : "Account Created", 'success'); toggleAuthForm(); }).catch(err => showAlert(err.message, 'error')); }
        
        function googleLogin() { showAlert(isArabic ? "لضمان أمان حسابك في هذا الإصدار، استخدم البريد الإلكتروني وكلمة المرور." : "Please use Email & Password for security.", 'info'); }
        function openPhoneAuth() { showAlert(isArabic ? "يرجى استخدام البريد الإلكتروني للتسجيل بشكل أسرع وأكثر استقراراً." : "Please use Email for faster login.", 'info'); }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebarOverlay').classList.toggle('active'); }
        function logout() { toggleSidebar(); auth.signOut(); }

        function loadData() {
            db.collection('users').doc(currentUser.uid).collection('customers').onSnapshot({ includeMetadataChanges: true }, snapshot => {
                document.getElementById('syncBadge').style.display = snapshot.metadata.hasPendingWrites ? 'flex' : 'none';
                if(!snapshot.empty || !snapshot.metadata.fromCache) { let temp = []; snapshot.forEach(doc => { let d = doc.data(); d.id = doc.id; temp.push(d); }); customers = temp; filterCustomers(); if(currentCustomerId) renderDetail(); }
            });
        }

        function calcCustomerTotal(cust) { return (cust.transactions || []).reduce((s, t) => t.type === 'debt' ? s + Number(t.amount) : s - Number(t.amount), 0); }
        function filterCustomers() {
            const query = document.getElementById('searchInput').value.toLowerCase(); let tot = 0, count = 0; const filtered = customers.filter(c => c.name.toLowerCase().includes(query));
            document.getElementById('customersList').innerHTML = filtered.map(c => { const total = calcCustomerTotal(c); tot += total; count++; return `<div class="customer-card" onclick="openCustomer('${c.id}')"><div class="customer-info"><h3>${c.name}</h3><div style="color:var(--gray); font-size:0.85rem;"><i class="fas fa-list"></i> ${c.transactions?c.transactions.length:0}</div></div><div class="customer-debt">${formatNum(total)}</div></div>`; }).join('');
            document.getElementById('totalCustomers').innerText = formatNum(count); document.getElementById('totalDebt').innerText = formatNum(tot);
        }

        function openCustomer(id) { currentCustomerId = id; document.getElementById('dashboardView').style.display = 'none'; document.getElementById('detailView').style.display = 'block'; document.getElementById('mainFab').classList.add('hidden'); renderDetail(); }
        function goBack() { currentCustomerId = null; document.getElementById('detailView').style.display = 'none'; document.getElementById('dashboardView').style.display = 'block'; document.getElementById('mainFab').classList.remove('hidden'); }
        function renderDetail() {
            const c = customers.find(x => x.id === currentCustomerId); if(!c) return goBack();
            document.getElementById('customerNameTitle').innerText = c.name; document.getElementById('customerTotalDebt').innerText = formatNum(calcCustomerTotal(c));
            const list = document.getElementById('debtsList'); if(!c.transactions || c.transactions.length === 0) { list.innerHTML = `<div style="text-align:center; color:var(--gray); padding:20px;">${isArabic ? "لا توجد عمليات" : "No records"}</div>`; return; }
            const sorted = [...c.transactions].sort((a,b) => new Date(b.date) - new Date(a.date));
            list.innerHTML = sorted.map(t => `<div class="debt-item ${t.type}"><div class="debt-item-details"><div class="debt-item-title">${t.type === 'payment' ? (isArabic ? 'دفعة مسددة' : 'Payment') : (t.item || '-')}</div><div class="debt-item-date"><i class="far fa-clock"></i> ${formatDate(t.date)}</div></div><div class="debt-item-actions"><span class="debt-amount">${t.type === 'payment' ? '-' : '+'}${formatNum(t.amount)}</span><div class="action-icons"><i class="fas fa-pen" onclick="openEditDialog('${t.id}')"></i> <i class="fas fa-trash" onclick="deleteTransactionConfirm('${t.id}')"></i></div></div></div>`).join('');
        }

        function openModal(id) { if(id==='customerModal') { document.getElementById('custName').value = ''; document.getElementById('custItem').value = ''; document.getElementById('custAmount').value = ''; } if(id==='debtModal') { document.getElementById('debtItem').value = ''; document.getElementById('debtAmount').value = ''; } if(id==='paymentModal') { document.getElementById('paymentAmount').value = ''; } showModal(id); }
        
        function addCustomer() { const name = document.getElementById('custName').value; const item = document.getElementById('custItem').value; const amt = document.getElementById('custAmount').value; if(!name) return showAlert(isArabic ? "الاسم مطلوب" : "Name required", 'error'); hideModal('customerModal'); let trans = []; if(item && amt) trans.push({ id: Date.now().toString(), type: 'debt', item: item, amount: Number(amt), date: new Date().toISOString() }); db.collection('users').doc(currentUser.uid).collection('customers').add({ name: name, transactions: trans }).catch(e => showAlert(e.message, 'error')); }
        function addTransaction(type) { const amt = document.getElementById(type === 'debt' ? 'debtAmount' : 'paymentAmount').value; const item = type === 'debt' ? document.getElementById('debtItem').value : (isArabic ? 'تسديد' : 'Payment'); if(!amt || amt <= 0) return showAlert(isArabic ? "مبلغ غير صحيح" : "Invalid amount", 'error'); hideModal(type === 'debt' ? 'debtModal' : 'paymentModal'); const c = customers.find(x => x.id === currentCustomerId); let transList = c.transactions || []; transList.push({ id: Date.now().toString(), type: type, item: item, amount: Number(amt), date: new Date().toISOString() }); db.collection('users').doc(currentUser.uid).collection('customers').doc(currentCustomerId).update({ transactions: transList }).catch(e => showAlert(e.message, 'error')); }
        function openEditDialog(tid) { editTransactionId = tid; const t = customers.find(x => x.id === currentCustomerId).transactions.find(x => x.id === tid); document.getElementById('editItem').value = t.type === 'payment' ? '' : t.item; document.getElementById('editItem').style.display = t.type === 'payment' ? 'none' : 'block'; document.getElementById('editAmount').value = t.amount; showModal('editModal'); }
        function saveEdit() { const newAmt = document.getElementById('editAmount').value; const newItem = document.getElementById('editItem').value; if(!newAmt || newAmt <= 0) return; hideModal('editModal'); const c = customers.find(x => x.id === currentCustomerId); const tIndex = c.transactions.findIndex(x => x.id === editTransactionId); c.transactions[tIndex].amount = Number(newAmt); if(c.transactions[tIndex].type === 'debt') c.transactions[tIndex].item = newItem; db.collection('users').doc(currentUser.uid).collection('customers').doc(currentCustomerId).update({ transactions: c.transactions }).catch(e => showAlert(e.message, 'error')); }
        function deleteTransactionConfirm(tid) { showConfirm(isArabic ? "حذف هذه العملية نهائياً؟" : "Delete permanently?", () => { const c = customers.find(x => x.id === currentCustomerId); db.collection('users').doc(currentUser.uid).collection('customers').doc(currentCustomerId).update({ transactions: c.transactions.filter(t => t.id !== tid) }).catch(e => showAlert(e.message, 'error')); }); }
        function deleteCustomerConfirm() { showConfirm(isArabic ? "سيتم حذف العميل وكل ديونه نهائياً!" : "Delete all records?", () => { db.collection('users').doc(currentUser.uid).collection('customers').doc(currentCustomerId).delete().catch(e => showAlert(e.message, 'error')); goBack(); }); }
        
        function showModal(id) { document.getElementById(id).classList.add('active'); } function hideModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
