<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Debt Tracker - دفتر الديون</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root {
            --primary: #6366f1; --secondary: #ec4899; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --dark: #0f172a; --dark-light: #1e293b; --light: #f8fafc; --gray: #94a3b8;
            --radius: 16px; --radius-sm: 12px; --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81); min-height: 100vh; color: var(--light); overflow-x: hidden; padding-top: env(safe-area-inset-top); }
        
        #authView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: var(--transition); }
        .auth-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: var(--radius); width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .auth-card h2 { margin-bottom: 20px; color: var(--primary); }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; }
        .auth-btn { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: var(--transition); }
        .btn-main { background: var(--primary); color: white; }
        .btn-social { background: rgba(255,255,255,0.1); color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-social.google:hover { background: #db4437; }
        .btn-social.phone:hover { background: var(--success); }
        
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .stat-card { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: var(--radius); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .stat-value { font-size: 1.8rem; font-weight: bold; margin: 10px 0; }
        
        .customers-container { padding: 0 20px 80px; display: grid; gap: 15px; }
        .customer-card { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .customer-info h3 { font-size: 1.2rem; }
        .customer-debt { font-size: 1.3rem; font-weight: bold; color: var(--secondary); }
        
        #detailView { display: none; padding: 20px; padding-bottom: 90px; }
        .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .total-box { text-align: center; padding: 20px; background: rgba(255,255,255,0.05); border-radius: var(--radius); margin-bottom: 20px; }
        .total-amount { font-size: 2.5rem; color: var(--primary); font-weight: bold; }
        
        .debt-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: var(--radius-sm); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--danger); }
        .debt-item.payment { border-right-color: var(--success); }
        .debt-amount { font-weight: bold; font-size: 1.1rem; }
        .debt-item.payment .debt-amount { color: var(--success); }
        .debt-item.debt .debt-amount { color: var(--danger); }
        
        .fab { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-size: 1.5rem; border: none; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.3); transition: var(--transition); display: flex; align-items: center; justify-content: center; z-index: 90; }
        .fab.hidden { transform: scale(0); opacity: 0; pointer-events: none; }
        
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border-radius: var(--radius-sm); border: none; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: var(--transition); }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--dark-light); padding: 25px; border-radius: var(--radius); width: 90%; max-width: 400px; }
        
        .copyright { text-align: center; padding: 20px; color: rgba(255,255,255,0.3); font-size: 0.85rem; margin-top: 20px; }
        .copyright span { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div id="authView">
        <div class="auth-card">
            <h2 class="logo"><i class="fas fa-wallet"></i> دفتر الديون</h2>
            <p style="margin-bottom: 20px; color: var(--gray);">سجل دخولك لحفظ بياناتك في السحابة</p>
            
            <input type="email" id="emailInput" class="auth-input" placeholder="البريد الإلكتروني">
            <input type="password" id="passwordInput" class="auth-input" placeholder="كلمة المرور">
            <button class="auth-btn btn-main" onclick="emailLogin()">دخول / تسجيل جديد</button>
            
            <div style="margin: 20px 0; color: var(--gray);">أو بواسطة</div>
            
            <button class="auth-btn btn-social google" onclick="alert('للتفعيل، راجع إعدادات Firebase Console أولاً')"><i class="fab fa-google"></i> حساب جوجل</button>
            <button class="auth-btn btn-social phone" onclick="alert('للتفعيل، راجع إعدادات Firebase Console أولاً')"><i class="fas fa-phone"></i> رقم الهاتف</button>
        </div>
        <div class="copyright">Developed by <span>Ejram</span> &copy; 2026</div>
    </div>

    <div id="appView" style="display: none;">
        <header class="header">
            <div class="logo"><i class="fas fa-wallet"></i> دفتر الديون</div>
            <div style="display: flex; gap: 15px;">
                <button style="background:none; border:none; color:white; font-size:1.2rem;" onclick="exportData()"><i class="fas fa-file-export"></i></button>
                <button style="background:none; border:none; color:white; font-size:1.2rem;" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div id="dashboardView">
            <div class="stats-container">
                <div class="stat-card">
                    <i class="fas fa-users" style="color:var(--primary); font-size: 2rem;"></i>
                    <div class="stat-value" id="totalCustomers">0</div>
                    <div>إجمالي العملاء</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-money-bill-wave" style="color:var(--secondary); font-size: 2rem;"></i>
                    <div class="stat-value" id="totalDebt">0</div>
                    <div>إجمالي الديون</div>
                </div>
            </div>
            
            <div class="customers-container" id="customersList"></div>
            <div class="copyright">Developed by <span>Ejram</span> &copy; 2026</div>
        </div>

        <div id="detailView">
            <div class="detail-header">
                <h2 id="customerNameTitle">اسم العميل</h2>
                <button style="background:rgba(255,255,255,0.1); border:none; padding:10px 15px; border-radius:10px; color:white;" onclick="goBack()"><i class="fas fa-arrow-right"></i> رجوع</button>
            </div>
            
            <div class="total-box">
                <div>الرصيد المتبقي</div>
                <div class="total-amount" id="customerTotalDebt">0</div>
            </div>

            <div class="action-buttons">
                <button class="btn" style="background:var(--danger);" onclick="showModal('debtModal')"><i class="fas fa-plus"></i> إضافة دين</button>
                <button class="btn" style="background:var(--success);" onclick="showModal('paymentModal')"><i class="fas fa-hand-holding-usd"></i> تسديد دفعة</button>
            </div>

            <h3 style="margin: 20px 0 10px;">سجل العمليات</h3>
            <div id="debtsList"></div>
        </div>
    </div>

    <button class="fab" id="mainFab" onclick="showModal('customerModal')"><i class="fas fa-plus"></i></button>

    <div class="modal" id="customerModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">إضافة عميل جديد</h3>
            <input type="text" id="custName" class="auth-input" placeholder="اسم العميل">
            <input type="text" id="custItem" class="auth-input" placeholder="المنتج الأول (اختياري)">
            <input type="number" id="custAmount" class="auth-input" placeholder="المبلغ">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" style="background:var(--primary);" onclick="addCustomer()">حفظ</button>
                <button class="btn" style="background:rgba(255,255,255,0.1);" onclick="hideModal('customerModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="modal" id="debtModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">تسجيل دين جديد</h3>
            <input type="text" id="debtItem" class="auth-input" placeholder="اسم المنتج">
            <input type="number" id="debtAmount" class="auth-input" placeholder="المبلغ">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" style="background:var(--danger);" onclick="addTransaction('debt')">تسجيل الدين</button>
                <button class="btn" style="background:rgba(255,255,255,0.1);" onclick="hideModal('debtModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px; color:var(--success);">تسديد دفعة مالية</h3>
            <input type="number" id="paymentAmount" class="auth-input" placeholder="المبلغ المدفوع">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" style="background:var(--success);" onclick="addTransaction('payment')">تأكيد الدفع</button>
                <button class="btn" style="background:rgba(255,255,255,0.1);" onclick="hideModal('paymentModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCcKXCMRlVWV7jo53v5EBXYErcq9-d4slQ",
            projectId: "aboroqya-4a460",
            storageBucket: "aboroqya-4a460.firebasestorage.app",
            appId: "1:998280256788:android:105cfdff77e5dd19d3b601"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        db.enablePersistence().catch(err => console.log("Offline mode error", err));

        let currentUser = null;
        let customers = [];
        let currentCustomerId = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('authView').style.display = 'none';
                document.getElementById('appView').style.display = 'block';
                loadData();
            } else {
                currentUser = null;
                document.getElementById('authView').style.display = 'flex';
                document.getElementById('appView').style.display = 'none';
            }
        });

        function emailLogin() {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            if(!email || !pass) return alert("أدخل البريد وكلمة المرور");
            
            auth.signInWithEmailAndPassword(email, pass)
                .catch(err => {
                    if(err.code === 'auth/user-not-found') {
                        auth.createUserWithEmailAndPassword(email, pass).catch(e => alert(e.message));
                    } else { alert("خطأ في تسجيل الدخول: " + err.message); }
                });
        }

        function logout() { auth.signOut(); }

        function loadData() {
            db.collection('users').doc(currentUser.uid).collection('customers').onSnapshot(snapshot => {
                customers = [];
                let totalD = 0;
                snapshot.forEach(doc => {
                    let data = doc.data();
                    data.id = doc.id;
                    customers.push(data);
                });
                renderDashboard();
                if(currentCustomerId) renderDetail();
            });
        }

        function calcCustomerTotal(cust) {
            if(!cust.transactions) return 0;
            return cust.transactions.reduce((sum, t) => {
                return t.type === 'debt' ? sum + Number(t.amount) : sum - Number(t.amount);
            }, 0);
        }

        function renderDashboard() {
            let totalOverall = 0;
            const list = document.getElementById('customersList');
            list.innerHTML = customers.map(c => {
                const total = calcCustomerTotal(c);
                totalOverall += total;
                return `
                <div class="customer-card" onclick="openCustomer('${c.id}')">
                    <div class="customer-info">
                        <h3>${c.name}</h3>
                        <div style="color:var(--gray); font-size:0.8rem;">عمليات: ${c.transactions ? c.transactions.length : 0}</div>
                    </div>
                    <div class="customer-debt">${total}</div>
                </div>`;
            }).join('');
            
            document.getElementById('totalCustomers').innerText = customers.length;
            document.getElementById('totalDebt').innerText = totalOverall;
        }

        function openCustomer(id) {
            currentCustomerId = id;
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('detailView').style.display = 'block';
            document.getElementById('mainFab').classList.add('hidden');
            renderDetail();
        }

        function goBack() {
            currentCustomerId = null;
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('dashboardView').style.display = 'block';
            document.getElementById('mainFab').classList.remove('hidden');
        }

        function renderDetail() {
            const c = customers.find(x => x.id === currentCustomerId);
            if(!c) return goBack();
            
            document.getElementById('customerNameTitle').innerText = c.name;
            document.getElementById('customerTotalDebt').innerText = calcCustomerTotal(c);
            
            const list = document.getElementById('debtsList');
            if(!c.transactions || c.transactions.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:var(--gray); padding:20px;">لا توجد عمليات مسجلة</div>';
                return;
            }

            const sorted = [...c.transactions].sort((a,b) => new Date(b.date) - new Date(a.date));
            
            list.innerHTML = sorted.map(t => `
                <div class="debt-item ${t.type}">
                    <div>
                        <div style="font-weight:bold;">${t.type === 'payment' ? 'دفعة مسددة' : t.item}</div>
                        <div style="font-size:0.8rem; color:var(--gray);">${new Date(t.date).toLocaleString('ar-EG')}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span class="debt-amount">${t.type === 'payment' ? '-' : '+'}${t.amount}</span>
                        <i class="fas fa-trash" style="color:rgba(255,255,255,0.3); cursor:pointer;" onclick="deleteTransaction('${t.id}')"></i>
                    </div>
                </div>
            `).join('');
        }

        async function addCustomer() {
            const name = document.getElementById('custName').value;
            const item = document.getElementById('custItem').value;
            const amt = document.getElementById('custAmount').value;
            if(!name) return alert("الاسم مطلوب");

            let trans = [];
            if(item && amt) trans.push({ id: Date.now().toString(), type: 'debt', item: item, amount: Number(amt), date: new Date().toISOString() });

            await db.collection('users').doc(currentUser.uid).collection('customers').add({ name: name, transactions: trans });
            hideModal('customerModal');
            document.getElementById('custName').value = ''; document.getElementById('custItem').value = ''; document.getElementById('custAmount').value = '';
        }

        async function addTransaction(type) {
            const amtId = type === 'debt' ? 'debtAmount' : 'paymentAmount';
            const itemId = type === 'debt' ? 'debtItem' : null;
            const amt = document.getElementById(amtId).value;
            const item = itemId ? document.getElementById(itemId).value : 'تسديد';
            
            if(!amt || amt <= 0) return alert("أدخل مبلغ صحيح");
            
            const c = customers.find(x => x.id === currentCustomerId);
            const newTrans = { id: Date.now().toString(), type: type, item: item, amount: Number(amt), date: new Date().toISOString() };
            
            let transList = c.transactions || [];
            transList.push(newTrans);
            
            await db.collection('users').doc(currentUser.uid).collection('customers').doc(currentCustomerId).update({ transactions: transList });
            hideModal(type === 'debt' ? 'debtModal' : 'paymentModal');
            document.getElementById(amtId).value = ''; if(itemId) document.getElementById(itemId).value = '';
        }

        async function deleteTransaction(tid) {
            if(!confirm("حذف هذه العملية؟")) return;
            const c = customers.find(x => x.id === currentCustomerId);
            const newList = c.transactions.filter(t => t.id !== tid);
            await db.collection('users').doc(currentUser.uid).collection('customers').doc(currentCustomerId).update({ transactions: newList });
        }

        function showModal(id) { document.getElementById(id).classList.add('active'); }
        function hideModal(id) { document.getElementById(id).classList.remove('active'); }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(customers));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href",     dataStr);
            downloadAnchorNode.setAttribute("download", "DebtTracker_Backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }
    </script>
</body>
</html>
